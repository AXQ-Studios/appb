version: "3"

services:

  frontend:
    build:
      context: ./frontend
    container_name: appb_frontend
    restart: always

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appb.rule=Host(`appb.axqstudios.tech`)"
      - "traefik.http.routers.appb.entrypoints=websecure"
      - "traefik.http.routers.appb.tls=true"
      - "traefik.http.services.appb.loadbalancer.server.port=80"

    networks:
      - traefik


networks:
  traefik:
    external: true
